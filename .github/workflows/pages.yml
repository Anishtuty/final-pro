name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"] # Or your default branch

# Permissions required for GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: This step creates the artifact that deploy-pages needs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If your files are in a folder (like 'dist' or 'public'), change '.' to that folder
          path: '.' 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Updating to v4 is recommended
