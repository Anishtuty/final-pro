<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ArcadeHub | Next‑Gen Gaming Platform</title>
  <!-- Google Fonts: Orbitron for futuristic look -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Animated background elements -->
  <div class="bg-gradient"></div>
  <div class="stars"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-gamepad"></i> ArcadeHub
    </div>
    <div class="nav-controls">
      <button class="theme-toggle" id="darkModeToggle">
        <i class="fas fa-moon"></i>
      </button>
      <div class="user-card" id="userInfoDisplay">
        <span id="userGreeting">Guest</span>
        <button id="loginBtn" class="btn-neon">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Hero section -->
    <section class="hero">
      <h1 class="glitch" data-text="ArcadeHub">ArcadeHub</h1>
      <p class="tagline">Where retro meets the future — play, compete, dominate.</p>
    </section>

    <!-- Games Grid -->
    <section class="games-section">
      <h2 class="section-title">
        <i class="fas fa-joystick"></i> Arcade Vault
      </h2>
      <div class="games-grid" id="gamesGrid"></div>
    </section>

    <!-- Leaderboard -->
    <section class="leaderboard-section">
      <h2 class="section-title">
        <i class="fas fa-trophy"></i> Hall of Fame
      </h2>
      <div class="leaderboard-panel glass-card">
        <div class="leaderboard-header">
          <select id="gameLeaderSelect" class="neon-select"></select>
        </div>
        <ul id="leaderboardList" class="leaderboard-list">
          <li>✨ Play games to appear ✨</li>
        </ul>
      </div>
    </section>
  </main>

  <footer>
    <p>⚡ Next‑gen gaming — scores sync across all devices ⚡</p>
  </footer>

  <!-- Login Modal -->
  <div id="loginModal" class="modal">
    <div class="modal-content glass-card">
      <h2><i class="fas fa-user-astronaut"></i> Enter the Arcade</h2>
      <p>Pick a callsign to track your scores</p>
      <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
      <button id="confirmLoginBtn" class="btn-neon full-width">Launch</button>
      <button id="closeModalBtn" class="btn-outline">Cancel</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
