<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake - ArcadeHub</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-container {
      max-width: 600px;
      margin: 2rem auto;
      text-align: center;
    }

    canvas {
      background: #1e293b;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .score {
      font-size: 1.5rem;
      margin: 1rem 0;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="logo"><a href="../index.html" style="text-decoration:none; color:inherit;">← ArcadeHub</a></div>
    <div class="nav-actions">
      <button class="btn-icon" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div class="container game-container">
    <h1>Snake</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="score">Score: <span id="score">0</span></div>
    <button class="btn-neon" id="restart">Restart</button>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/games/snake.js"></script>
</body>

</html>
