<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack‑a‑Mole - ArcadeHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container {
            max-width: 600px;
            margin: 2rem auto;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 2rem 0;
        }

        .hole {
            background: #8B5A2B;
            border-radius: 50%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .hole.active {
            background: #6B4226;
        }

        .score {
            font-size: 1.5rem;
            margin: 1rem 0;
        }

        .timer {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo"><a href="../index.html" style="text-decoration:none; color:inherit;">← ArcadeHub</a></div>
        <div class="nav-actions">
            <button class="btn-icon" id="darkModeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="container game-container">
        <h1>Whack‑a‑Mole</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <div class="timer">Time: <span id="timer">30</span>s</div>
        <div class="grid" id="grid"></div>
        <button class="btn-neon" id="restart">Restart</button>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/games/whackamole.js"></script>
</body>

</html>
